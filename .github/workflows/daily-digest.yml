name: Canary — Daily Digest

on:
  schedule:
    - cron: '0 9 * * *'  # Every day at 9am UTC
  workflow_dispatch:       # Manual trigger anytime

jobs:
  daily:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout public repo (snapshots + queue storage)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout private core (scripts + logic)
        uses: actions/checkout@v4
        with:
          repository: iambel0ved-dev/canary-fanout-core
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: core

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd core
          npm install

      - name: Run daily digest engine
        run: node core/scripts/daily.js
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DIGEST_EMAIL: ${{ secrets.DIGEST_EMAIL }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          SNAPSHOTS_DIR: ${{ github.workspace }}/snapshots
          QUEUE_DIR: ${{ github.workspace }}/queue
