name: Canary — Hourly Crawl

on:
  schedule:
    - cron: '0 * * * *'  # Every hour
  workflow_dispatch:       # Manual trigger anytime

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout public repo (snapshots + queue storage)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout private core (scripts + logic)
        uses: actions/checkout@v4
        with:
          repository: iambel0ved-dev/canary-fanout-core
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: core

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd core
          npm install

      - name: Run crawler
        run: node core/scripts/crawl.js
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SNAPSHOTS_DIR: ${{ github.workspace }}/snapshots
          QUEUE_DIR: ${{ github.workspace }}/queue

      - name: Commit snapshots and queue to public repo
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: update snapshots and queue [skip ci]'
          file_pattern: 'snapshots/*.json queue/*.json'
          commit_user_name: 'Canary Bot'
          commit_user_email: 'bot@canary.io'
