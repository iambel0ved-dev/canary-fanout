name: Canary — Weekly Digest

on:
  schedule:
    - cron: '0 9 * * 5'
  workflow_dispatch:

jobs:
  weekly:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout public repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout private core
        uses: actions/checkout@v4
        with:
          repository: iambel0ved-dev/canary-fanout-core
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: core

      - name: Checkout intelligence repo
        uses: actions/checkout@v4
        with:
          repository: iambel0ved-dev/canary-intelligence
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: intelligence

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser

      - name: Install dependencies
        run: |
          cd core
          npm install

      - name: Run weekly digest engine
        run: node core/scripts/weekly.js
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DIGEST_EMAIL: ${{ secrets.DIGEST_EMAIL }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
          SNAPSHOTS_DIR: ${{ github.workspace }}/snapshots
          QUEUE_DIR: ${{ github.workspace }}/queue
          INTELLIGENCE_DIR: ${{ github.workspace }}/intelligence

      - name: Publish briefing to GitHub Pages
        run: |
          cd intelligence
          git config user.name "Canary Bot"
          git config user.email "bot@canary.io"
          git add .
          git diff --staged --quiet || git commit -m "briefing: weekly $(date +%Y-%m-%d)"
          git push || true
